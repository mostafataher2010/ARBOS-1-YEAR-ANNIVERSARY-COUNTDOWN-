<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arbos 1 Year on TikTok</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: linear-gradient(270deg, #0a0a0a, #333333, #0a0a0a);
    background-size: 400% 400%;
    animation: gradientMove 10s ease infinite;
    color: white;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    flex-direction: column;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container { text-align: center; }

#main-title {
    font-size: clamp(1.5rem, 4vw, 3rem);
    margin-bottom: 15px;
}

#timer {
    font-size: clamp(2rem, 6vw, 4rem);
    font-weight: bold;
    font-variant-numeric: tabular-nums;
}

.labels {
    margin-top: 5px;
    font-size: 0.9rem;
    color: #aaa;
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    background: white;
    color: black;
    font-weight: bold;
    border-radius: 10px;
    cursor: pointer;
}

#finale-text {
    position: absolute;
    font-size: clamp(2rem, 6vw, 5rem);
    opacity: 0;
    transition: 2s;
}

.show { opacity: 1; }
.hide { opacity: 0; }
</style>
</head>

<body>

<div class="container">
    <h2 id="main-title">ARBOS'S 1 YEAR ANNIVERSARY LEFT</h2>
    <div id="timer">00 : 00 : 00 : 00</div>
    <div class="labels">DAYS : HOURS : MINS : SECS</div>

    <button onclick="sharePage()">SHARE 🎉</button>
</div>

<h1 id="finale-text">🎉 ARBOS 1 YEAR 🎉</h1>

<audio id="celebration-sound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

<script>
// 🇪🇬 Egypt time
const target = new Date("2026-05-25T00:00:00+02:00").getTime();

const timer = document.getElementById("timer");
const finaleText = document.getElementById("finale-text");
const mainTitle = document.getElementById("main-title");
const sound = document.getElementById("celebration-sound");

let finished = false;

function update() {
    const now = Date.now();
    const diff = target - now;

    if (diff <= 0 && !finished) {
        finished = true;
        timer.innerHTML = "00 : 00 : 00 : 00";
        startCelebration();
        return;
    }

    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);

    timer.innerHTML =
        String(d).padStart(2,'0') + " : " +
        String(h).padStart(2,'0') + " : " +
        String(m).padStart(2,'0') + " : " +
        String(s).padStart(2,'0');
}

// run instantly + every second
update();
setInterval(update, 1000);

// 🎆 celebration
function startCelebration() {
    mainTitle.classList.add("hide");
    finaleText.classList.add("show");

    sound.play();

    const duration = 5000;
    const end = Date.now() + duration;

    const interval = setInterval(() => {
        if (Date.now() > end) return clearInterval(interval);

        confetti({ particleCount: 80, spread: 120 });
    }, 250);
}

// 📲 share button
function sharePage() {
    if (navigator.share) {
        navigator.share({
            title: "ARBOS 1 YEAR",
            text: "Join the countdown 🎉",
            url: window.location.href
        });
    } else {
        alert("Copy this link: " + window.location.href);
    }
}
</script>

</body>
</html>
