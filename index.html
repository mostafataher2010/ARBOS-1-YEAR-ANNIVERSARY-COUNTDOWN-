<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbos 1 Year on TikTok</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(270deg, #0a0a0a, #333333, #0a0a0a);
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 0 20px;
        }

        #main-title {
            font-size: clamp(1.5rem, 4vw, 3rem);
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 5px 15px rgba(0, 0, 0, 0.8);
            transition: opacity 1s ease-in-out;
            margin-bottom: 10px;
        }

        #timer-container {
            margin-top: 20px;
            transition: opacity 1s ease-in-out;
        }

        #timer {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: bold;
            letter-spacing: 2px;
            font-variant-numeric: tabular-nums; 
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .labels {
            display: flex;
            justify-content: center;
            gap: 2vw;
            margin-top: 5px;
            font-size: clamp(0.7rem, 2vw, 1rem);
            color: #b3b3b3;
            letter-spacing: 1px;
        }

        .labels span {
            width: clamp(50px, 8vw, 80px);
        }

        #finale-text {
            position: absolute;
            font-size: clamp(2rem, 5vw, 5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            opacity: 0;
            pointer-events: none;
            transition: opacity 2.5s ease-in-out;
            text-align: center;
            width: 100%;
            padding: 0 20px;
        }

        .fade-out { opacity: 0 !important; }
        .fade-in { opacity: 1 !important; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="main-title">ARBOS'S 1 YEAR ANNIVERSARY LEFT</h2>
    
    <div id="timer-container">
        <div id="timer">00 : 00 : 00 : 00</div>
        <div class="labels">
            <span>DAYS</span>
            <span>HOURS</span>
            <span>MINS</span>
            <span>SECS</span>
        </div>
    </div>
</div>

<h1 id="finale-text">ARBOS 1 YEAR ON TIKTOK</h1>

<script>
const countDownDate = new Date("May 25, 2026 00:00:00").getTime();

const timerElement = document.getElementById("timer");
const timerContainer = document.getElementById("timer-container");
const mainTitle = document.getElementById("main-title");
const finaleText = document.getElementById("finale-text");

const x = setInterval(function() {
    const now = new Date().getTime();
    const distance = countDownDate - now;

    if (distance <= 0) {
        clearInterval(x);
        timerElement.innerHTML = "00 : 00 : 00 : 00";
        triggerFinale();
        return;
    }

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    timerElement.innerHTML =
        String(days).padStart(2, '0') + " : " +
        String(hours).padStart(2, '0') + " : " +
        String(minutes).padStart(2, '0') + " : " +
        String(seconds).padStart(2, '0');

}, 1000);

function triggerFinale() {
    timerContainer.classList.add("fade-out");
    mainTitle.classList.add("fade-out");

    setTimeout(() => {
        finaleText.classList.add("fade-in");
    }, 500);

    launchFireworks();
}

function launchFireworks() {
    var duration = 5 * 1000;
    var animationEnd = Date.now() + duration;

    var interval = setInterval(function() {
        if (Date.now() > animationEnd) return clearInterval(interval);

        confetti({ particleCount: 50, spread: 360 });
    }, 250);
}
</script>

</body>
</html>
